services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: modelgate
      POSTGRES_USER: modelgate
      POSTGRES_PASSWORD: modelgate_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelgate"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/server
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./configs:/app/configs:ro
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/server
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs:ro
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
