services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: modelgate
      POSTGRES_USER: modelgate
      POSTGRES_PASSWORD: modelgate_password
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelgate"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/server
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://modelgate:modelgate_password@postgres:5432/modelgate
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
      UPLOADS_DIR: /app/storage/uploads
      OUTPUTS_DIR: /app/storage/outputs
      PREVIEWS_DIR: /app/storage/previews
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    command: sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${HOST_API_PORT:-8000}:8000"
    volumes:
      - ./configs:/app/configs:ro
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    build:
      context: ./apps/server
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://modelgate:modelgate_password@postgres:5432/modelgate
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
      UPLOADS_DIR: /app/storage/uploads
      OUTPUTS_DIR: /app/storage/outputs
      PREVIEWS_DIR: /app/storage/previews
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - ./configs:/app/configs:ro
      - ./storage:/app/storage
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "${HOST_WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/workspace').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  postgres_data:
