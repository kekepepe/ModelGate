repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: "^apps/server/"
      - id: ruff-format
        files: "^apps/server/"

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: "^apps/server/"

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: "^apps/server/app/"
        additional_dependencies: ["pydantic>=2.10.3", "types-requests"]
        args: ["--config-file=apps/server/pyproject.toml"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.4.2
    hooks:
      - id: prettier
        files: "^apps/web/.*\.(ts|tsx|js|jsx|json|md|css)$"

  - repo: local
    hooks:
      - id: config-validate
        name: Validate ModelGate config consistency
        entry: bash -c 'cd apps/server && PYTHONPATH=. python scripts/validate_settings.py || exit 0'
        language: system
        pass_filenames: false
