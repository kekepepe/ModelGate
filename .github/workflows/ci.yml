name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: modelgate
          POSTGRES_USER: modelgate
          POSTGRES_PASSWORD: modelgate_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U modelgate -d modelgate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://modelgate:modelgate_password@localhost:5432/modelgate
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      MODELGATE_SECRET_KEY: ci-modelgate-secret-key
      MIMO_API_KEY: ci-mimo-key
      MINIMAX_API_KEY: ci-minimax-key
      VOLCENGINE_API_KEY: ci-volcengine-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: python -m pip install -e "apps/server[dev]"

      - name: Ruff
        run: ruff check apps/server/app tests

      - name: Black
        run: black --check apps/server/app tests

      - name: Compile backend
        run: python -m compileall apps/server/app

      - name: Validate config consistency
        run: PYTHONPATH=apps/server python apps/server/scripts/validate_settings.py

      - name: Validate model registry
        run: PYTHONPATH=apps/server python apps/server/scripts/validate_model_registry.py

      - name: Alembic upgrade
        run: PYTHONPATH=apps/server alembic -c apps/server/alembic.ini upgrade head

      - name: Pytest with coverage
        run: |
          PYTHONPATH=apps/server pytest -q \
            --cov=apps/server/app \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:apps/server/coverage.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/server/coverage.xml

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Prettier
        run: npx prettier --check "apps/web/**/*.{ts,tsx,js,jsx,json,md,css}"

      - name: ESLint
        run: npm run web:lint

      - name: Stylelint
        run: npx stylelint "apps/web/**/*.{css,scss}"

      - name: Typecheck
        run: npm run web:typecheck

      - name: Build
        run: npm run web:build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        run: npm run e2e
